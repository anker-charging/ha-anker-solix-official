name: Question
description: Ask a question about setup, usage, or troubleshooting
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help! Please check the [README](https://github.com/anker-charging/ha-anker-solix-official#readme) and existing issues first.

  - type: dropdown
    id: topic
    attributes:
      label: Question Topic
      description: What is your question about?
      options:
        - Installation / Setup
        - Configuration
        - Modbus Connection
        - Entity / Sensor Data
        - Automation
        - Compatibility
        - Other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: Please describe your question in detail.
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: Which version of Home Assistant are you running? (if relevant)
      placeholder: e.g., 2024.12.0
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Integration Version
      description: Which version of this integration are you using? (if relevant)
      placeholder: e.g., 1.0.0
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any screenshots, configuration snippets, or other details that might help answer your question.
    validations:
      required: false
